<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice STS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-top">
        <div>
          <p class="eyebrow">Voice STS</p>
          <h1>Conversations</h1>
        </div>
        <button id="newChatBtn" class="ghost-btn" type="button">New chat</button>
      </div>

      <div id="conversationList" class="conversation-list"></div>
    </aside>

    <main class="chat-panel">
      <header class="chat-header">
        <div>
          <p class="eyebrow">Active Chat</p>
          <h2 id="chatTitle">New conversation</h2>
        </div>
        <button id="voiceChatBtn" class="voice-chat-btn" type="button" title="Start voice chat">
          <span class="btn-icon">🎧</span>
          <span class="btn-label">Voice chat</span>
        </button>
      </header>

      <div id="chatWorkspace" class="chat-workspace">
        <section id="chatBody" class="chat-body"></section>

        <aside id="voiceAssistantPanel" class="voice-assistant-panel hidden" aria-live="polite">
          <div class="voice-panel-header">
            <div>
              <p class="eyebrow">Voice Session</p>
              <h3 id="voicePanelTitle">Assistant live</h3>
            </div>
            <button id="voicePanelCloseBtn" class="ghost-btn voice-panel-close" type="button" title="Close voice panel">
              Close
            </button>
          </div>

          <div id="voiceVisualizer" class="voice-visualizer" data-state="idle">
            <div class="voice-orb">
              <span class="voice-orb-core"></span>
              <span class="voice-orb-ring ring-one"></span>
              <span class="voice-orb-ring ring-two"></span>
              <span class="voice-orb-ring ring-three"></span>
            </div>
            <div class="voice-bars" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>

          <div class="voice-panel-copy">
            <p id="voiceStateLabel" class="voice-state-label">Idle</p>
            <p id="voiceStateHint" class="voice-state-hint">Open voice chat to start a live back-and-forth session.</p>
          </div>

          <div class="voice-panel-transcript">
            <div class="voice-transcript-block">
              <span class="voice-transcript-label">You</span>
              <p id="voiceUserTranscript" class="voice-transcript-text">Waiting for your voice…</p>
            </div>
            <div class="voice-transcript-block">
              <span class="voice-transcript-label">Assistant</span>
              <p id="voiceAssistantTranscript" class="voice-transcript-text">Responses will appear here and in the main chat.</p>
            </div>
          </div>
        </aside>
      </div>

      <form id="composerForm" class="composer" novalidate>
        <div class="composer-input-wrap">
          <textarea
            id="textInput"
            placeholder="Type a message or use the mic..."
            rows="1"
          ></textarea>
        </div>

        <div class="composer-actions">
          <button id="micTranscribeBtn" class="icon-btn" type="button" title="Transcribe speech">🎤</button>
          <button id="sendBtn" class="send-btn" type="submit" title="Send message">Send</button>
        </div>
      </form>
    </main>
  </div>

  <script src="https://aka.ms/csspeech/jsbrowserpackageraw"></script>
  <script type="module" src="speech.js?v=20260421-2"></script>
</body>
</html>
